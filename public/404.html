<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Finavators · GPME-MT</title>
    <script type="text/javascript">
      // GitHub Pages n'a pas de vrai routage côté serveur pour une SPA : une
      // route React comme /contact renvoie un 404 natif. On encode le chemin
      // demandé dans le query string et on redirige vers index.html, qui le
      // décode et restaure l'URL avant que React Router ne s'initialise.
      var pathSegmentsToKeep = 1; // conserve /FINA_WEBSITE/

      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1 + pathSegmentsToKeep).split("/").join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
